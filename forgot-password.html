<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password | SaaS Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/auth.css">
</head>

<body class="auth-bg">
<div id="pageLoader" class="page-loader">
  <div class="spinner"></div>
</div>
  <div class="card auth-card p-4">
    <div class="text-center mb-4">
      <h4 class="auth-logo">Forgot your password?</h4>
      <p class="text-muted auth-title">Enter your email address to receive a password reset link.</p>
    </div>

    <div id="loginError" class="alert alert-danger d-none"></div>

    <form id="forgotForm">
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <input type="email" id="forgotEmail" class="form-control" placeholder="admin@example.com">
      </div>


      <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
    </form>

    <div class="text-center mt-3 auth-footer">
      <a href="login.html">← Back to Login</a>
    </div>
  </div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  

  <!-- Loader -->
<script src="/assets/js/loader.js"></script>

<!-- Auth Guard -->
<script src="/assets/js/guard.js"></script>

<!-- Auth (login / logout) -->
<script src="/assets/js/auth.js"></script>
</body>
</html>
