<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | SaaS Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/auth.css">
</head>

<body class="auth-bg">
<div id="pageLoader" class="page-loader">
  <div class="spinner"></div>
</div>
  <div class="card auth-card p-4">
    <div class="text-center mb-4">
      <h4 class="auth-logo">SaaS<span>Admin</span></h4>
      <p class="text-muted auth-title">Login to your account</p>
    </div>

    <div id="loginError" class="alert alert-danger d-none"></div>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="admin@example.com">
      </div>

      <div class="mb-3 password-wrapper">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control">
        <button type="button" class="btn btn-sm btn-light toggle-password">
          <i class="bi bi-eye"></i>
        </button>
      </div>

      <div class="d-flex justify-content-between mb-3 auth-footer">
        <div>
          <input type="checkbox" id="remember">
          <label for="remember">Remember me</label>
        </div>
        <a href="forgot-password.html">Forgot password?</a>
      </div>

      <button class="btn btn-primary w-100">Login</button>
    </form>

    <div class="text-center mt-3 auth-footer">
      Don't have an account? <a href="register.html">Register</a>
    </div>
  </div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  

  <!-- Loader -->
<script src="/assets/js/loader.js"></script>

<!-- Auth Guard -->
<script src="/assets/js/guard.js"></script>

<!-- Auth (login / logout) -->
<script src="/assets/js/auth.js"></script>
</body>
</html>
