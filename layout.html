<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SaaS Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
    rel="stylesheet"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <div class="wrapper d-flex">

    <!-- ================= SIDEBAR ================= -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h4 class="logo">
          <i class="bi bi-grid logo-icon"></i>
          <span class="logo-text">SaaS<span>Admin</span></span>
        </h4>
      </div>

      <ul class="menu">
        <li class="active">
          <a href="#" data-label="Dashboard">
            <i class="bi bi-speedometer2"></i>
            <span>Dashboard</span>
          </a>
        </li>

        <li>
          <a href="#" data-label="Users">
            <i class="bi bi-people"></i>
            <span>Users</span>
          </a>
        </li>

        <li>
          <a href="#" data-label="Subscription">
            <i class="bi bi-box"></i>
            <span>Subscriptions</span>
          </a>
        </li>

        <li>
          <a href="#" data-label="Billing">
            <i class="bi bi-credit-card"></i>
            <span>Billing</span>
          </a>
        </li>

        <li>
          <a href="#" data-label="Invoices">
            <i class="bi bi-receipt"></i>
            <span>Invoices</span>
          </a>
        </li>

        <li>
          <a href="#" data-label="Settings">
            <i class="bi bi-gear"></i>
            <span>Settings</span>
          </a>
        </li>
      </ul>
    </aside>

    <!-- ================= MAIN CONTENT ================= -->
    <div class="main">

      <!-- ===== TOP NAVBAR ===== -->
      <nav class="topbar d-flex justify-content-between align-items-center">

        <button class="btn btn-sm btn-light" id="toggleSidebar">
          <i class="bi bi-list"></i>
        </button>

        <div class="d-flex align-items-center gap-3">

          <button class="btn btn-sm btn-outline-secondary" id="themeToggle">
            <i class="bi bi-moon"></i>
          </button>

          <!-- Notifications -->
          <div class="dropdown">
            <button
              class="btn btn-sm btn-light position-relative"
              data-bs-toggle="dropdown"
            >
              <i class="bi bi-bell"></i>
              <span
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
              >
                3
              </span>
            </button>

            <ul class="dropdown-menu dropdown-menu-end">
              <li class="dropdown-header">Notifications</li>
              <li><a class="dropdown-item" href="#">New user registered</a></li>
              <li><a class="dropdown-item" href="#">Subscription upgraded</a></li>
              <li><a class="dropdown-item" href="#">Payment received</a></li>
              <li><hr class="dropdown-divider" /></li>
              <li><a class="dropdown-item text-center" href="#">View all</a></li>
            </ul>
          </div>

          <!-- User -->
          <div class="dropdown user-dropdown">
            <a
              href="#"
              class="d-flex align-items-center text-decoration-none"
              data-bs-toggle="dropdown"
            >
              <span class="me-2">Admin</span>
              <img
                src="assets/images/user.png"
                class="rounded-circle user-avatar"
                alt="User"
              />
            </a>

            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="#">My Profile</a></li>
              <li><a class="dropdown-item" href="#">Settings</a></li>
              <li><hr class="dropdown-divider" /></li>
              <li><a class="dropdown-item text-danger" href="#">Logout</a></li>
            </ul>
          </div>

        </div>
      </nav>

      <!-- ===== PAGE CONTENT START (future) ===== -->
      <!-- yahin se dashboard / pages ka content aayega -->

    </div>
  </div>

  <!-- Charts -->
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JS -->
  <script src="assets/js/app.js"></script>
</body>
</html>
