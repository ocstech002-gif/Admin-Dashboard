<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | SaaS Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/auth.css">
</head>

<body class="auth-bg">

<div id="pageLoader" class="page-loader">
  <div class="spinner"></div>
</div>

<div class="card auth-card p-4">
  <div class="text-center mb-4">
    <h4 class="auth-logo">SaaS<span>Admin</span></h4>
    <p class="text-muted auth-title">Create your account</p>
  </div>

  <form id="registerForm">
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-control" placeholder="John Doe">
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" placeholder="admin@example.com">
    </div>

    <div class="mb-3 password-wrapper">
      <label class="form-label">Password</label>
      <input type="password" class="form-control">
      <button type="button" class="btn btn-sm btn-light toggle-password">
        <i class="bi bi-eye"></i>
      </button>
    </div>

    <button class="btn btn-primary w-100">Register</button>
  </form>

  <div class="text-center mt-3 auth-footer">
    Already have an account? <a href="login.html">Login</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/loader.js"></script>
<script src="/assets/js/auth.js"></script>
</body>
</html>
